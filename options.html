<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Chrome 快捷键速查 — 选项</title>
  <style>
    body {
      font: 13px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #202124;
      margin: 16px;
      min-width: 280px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 12px 0;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }
    label .sub {
      font-size: 11px;
      font-weight: 400;
      color: #5f6368;
      margin-left: 0.35em;
    }
    .field {
      margin-bottom: 14px;
    }
    select, input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font: inherit;
    }
    #status {
      font-size: 12px;
      margin-top: 12px;
      min-height: 1.2em;
      color: #188038;
    }
  </style>
</head>
<body>
  <h1>快捷键速查 — 选项</h1>

  <div class="field">
    <label for="trigger">触发键<span id="trigger-hint" class="sub">在部分键盘布局下键名可能不同。</span></label>
    <select id="trigger" aria-describedby="trigger-hint"></select>
  </div>

  <div class="field">
    <label for="holdMs">长按时长 <span class="sub">建议 500 ～ 1500 ms。</span></label>
    <input id="holdMs" type="number" min="200" max="5000" step="50" />
  </div>

  <div class="field">
    <label for="sheetPlatform">Mac/Windows</label>
    <select id="sheetPlatform"></select>
  </div>

  <p id="status" role="status" aria-live="polite"></p>

  <script src="options.js"></script>
</body>
</html>
